<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>チャート初期表示テスト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family: sans-serif;
    }

    #chartContainer {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <!-- ★ 初期表示でチャートを描画する領域 -->
  <div id="chartContainer"></div>

  <!-- ★ Lightweight Charts（確実に動く CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>

  <!-- ★ 初期表示チャート用スクリプト -->
  <script src="chart-init.js"></script>

</body>
</html>
